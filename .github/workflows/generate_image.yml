name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Image
        run: |
          # 1. Получаем чистый промпт и убираем лишние символы
          RAW_PROMPT="${{ github.event.client_payload.prompt }}"
          echo "Получен промпт: $RAW_PROMPT"
          
          # 2. Очищаем от переносов строк и лишних кавычек
          CLEAN_PROMPT=$(echo "$RAW_PROMPT" | tr -d '\n\r"' | xargs)
          
          # 3. Кодируем для URL
          ENCODED_PROMPT=$(echo "$CLEAN_PROMPT" | jq -sRr @uri)
          
          # 4. Формируем URL
          IMAGE_URL="https://image.pollinations.ai/p/${ENCODED_PROMPT}?width=1024&height=1024&nologo=true"
          echo "Финальный URL для запроса: $IMAGE_URL"
          
          # 5. Скачиваем
          curl -L -o slide1.jpg "$IMAGE_URL"
          
      - name: Check and Commit
        run: |
          # Если файл меньше 1Кб, значит скачалась ошибка, а не картинка
          if [ $(stat -c%s slide1.jpg) -lt 1000 ]; then
            echo "::error::Картинка слишком мала (вероятно, это ошибка 404)"
            cat slide1.jpg
            exit 1
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add slide1.jpg
          if ! git diff-index --quiet HEAD; then
            git commit -m "Generated slide1.jpg"
            git push
          fi
