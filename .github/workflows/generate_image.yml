name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Image via Curl
        run: |
          # Выводим промпт для отладки
          echo "Prompt: ${{ github.event.client_payload.prompt }}"
          
          # Кодируем промпт
          ENCODED_PROMPT=$(echo "${{ github.event.client_payload.prompt }}" | jq -sRr @uri)
          IMAGE_URL="https://image.pollinations.ai/p/${ENCODED_PROMPT}?width=1024&height=1024&nologo=true"
          
          echo "URL: $IMAGE_URL"
          
          # Скачиваем без флага -f, чтобы увидеть содержимое ошибки
          curl -L -o slide1.jpg "$IMAGE_URL"
          
      - name: Check and Commit
        run: |
          # Проверяем, не скачался ли текстовый файл вместо картинки
          if grep -q "404" slide1.jpg || grep -q "Not Found" slide1.jpg; then
            echo "::error::Сервер вернул 404. Проверьте промпт."
            cat slide1.jpg
            exit 1
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add slide1.jpg
          if ! git diff-index --quiet HEAD; then
            git commit -m "Generated slide1.jpg"
            git push
          fi
