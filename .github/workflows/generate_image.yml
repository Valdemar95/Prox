name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Image via Curl
        run: |
          ENCODED_PROMPT=$(echo "${{ github.event.client_payload.prompt }}" | jq -sRr @uri)
          # Используем -f, чтобы curl выдал ошибку, если статус не 200
          # Используем --fail-with-body для лучшей диагностики
          curl -f -L -o slide1.jpg "https://image.pollinations.ai/p/${ENCODED_PROMPT}?width=1024&height=1024&nologo=true"
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Проверяем, что файл не пустой и не содержит ошибку "404"
          if grep -q "404" slide1.jpg; then
            echo "Ошибка: Картинка не найдена (404)"
            exit 1
          fi
          
          git add slide1.jpg
          if ! git diff-index --quiet HEAD; then
            git commit -m "Generated new slide1.jpg"
            git push
          fi
