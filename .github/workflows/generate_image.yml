name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Image via Stability AI
        env:
          API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          # Подготовка промпта
          CLEAN_PROMPT=$(echo "${{ github.event.client_payload.prompt }}" | tr -d '\n\r"' | xargs)
          
          # Запрос к Stability AI (модель Core)
          curl -f -sS -X POST https://api.stability.ai/v2beta/stable-image/generate/core \
            -H "authorization: Bearer $API_KEY" \
            -H "accept: image/*" \
            -F "prompt=$CLEAN_PROMPT" \
            -F "output_format=jpeg" \
            -o slide1.jpg
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add slide1.jpg
          
          # Если картинка успешно создалась и отличается от старой
          if ! git diff-index --quiet HEAD; then
            git commit -m "Generated new slide via Stability AI"
            git push
          else
            echo "No changes detected."
          fi
