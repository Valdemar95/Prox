name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image via Stability AI
        env:
          API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          # Подготовка промпта
          CLEAN_PROMPT=$(echo "${{ github.event.client_payload.prompt }}" | tr -d '\n\r"' | xargs)
          echo "Clean prompt: $CLEAN_PROMPT"
          
          # Запрос к Stability AI (модель Core)
          RESPONSE=$(curl -v -sS -w "%{http_code}" -X POST https://api.stability.ai/v2beta/stable-image/generate/core \
            -H "authorization: Bearer $API_KEY" \
            -H "accept: image/*" \
            -F "prompt=$CLEAN_PROMPT" \
            -F "output_format=jpeg" \
            -o slide1.jpg)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP Status Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error generating image"
            cat slide1.jpg 2>/dev/null || true
            exit 1
          fi
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add slide1.jpg
          
          # Если картинка успешно создалась и отличается от старой
          if ! git diff-index --quiet HEAD; then
            git commit -m "Generated new slide via Stability AI"
            git push
          else
            echo "No changes detected."
          fi
