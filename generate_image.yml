name: Generate Carousel Image

on:
  repository_dispatch:
    types: [n8n_trigger]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Download Image via Curl
        run: |
          # Принимаем промпт из n8n, кодируем его и скачиваем картинку
          ENCODED_PROMPT=$(echo "${{ github.event.client_payload.prompt }}" | jq -sRr @uri)
          curl -L -o slide1.jpg "https://image.pollinations.ai/p/${ENCODED_PROMPT}?width=1024&height=1024&nologo=true"
          
      - name: Save Image to Repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add slide1.jpg
          git commit -m "Generated new slide from n8n" || exit 0
          git push
